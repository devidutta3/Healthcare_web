<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant | Techno Saiyan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">Techno Saiyan</h1>
  <nav class="nav-links">
    <a href="patient.html">Back to Dashboard</a>
  </nav>
</header>

<section class="chat-section">
  <h3>AI Health Assistant</h3>
  <div class="chat-container">
    <div class="chat-box" id="chatBox">
      <div class="message bot-message">Hello! I am your AI health assistant. How can I help you today?</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="Type your health query...">
      <button class="btn" id="sendMessageBtn">Send</button>
    </div>
  </div>
</section>

<footer class="footer">
  <p>© 2026 Techno Saiyan</p>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
