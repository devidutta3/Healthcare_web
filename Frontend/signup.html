<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | Techno Sayain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">Techno Sayain</h1>
</header>

<section class="auth-section">
  <h3>Create Account</h3>

  <!-- PATIENT SIGN UP BOX -->
  <div class="auth-box animate-box">
    <h4>Patient Registration</h4>

    <input type="text" placeholder="Patient Name">
    <input type="text" placeholder="Patient Phone Number">
    <input type="number" placeholder="Patient Age">
    <input type="number" placeholder="Patient Height (cm)">
    <input type="number" placeholder="Patient Weight (kg)">
    <input type="email" placeholder="Email ID">

    <button class="btn">Register Patient</button>
  </div>

  <!-- DOCTOR SIGN UP BOX -->
  <div class="auth-box animate-box">
    <h4>Doctor Registration</h4>

    <input type="text" placeholder="Doctor Name">
    <input type="text" placeholder="Phone Number">
    <input type="text" placeholder="Specialization">
    <input type="email" placeholder="Email ID">

    <button class="btn">Register Doctor</button>
  </div>
</section>

<footer class="footer">
  <p>© 2026 Techno Sayain</p>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
