<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In | Techno Sayain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">Techno Sayain</h1>
  <nav class="nav-links">
    <a href="index.html">Home</a>
  </nav>
</header>

<section class="auth-section">
  <h3>Sign In</h3>

  <!-- PATIENT SIGN IN -->
  <div class="auth-box">
    <h4>Patient Sign In</h4>
    <!-- 🔧 FIX: added id -->
    <input type="text" id="patientPhone" placeholder="Patient Phone Number">
    <button class="btn" id="patientSignin">Sign In</button>
  </div>

  <!-- DOCTOR SIGN IN -->
  <div class="auth-box">
    <h4>Doctor Sign In</h4>
    <!-- 🔧 FIX: added id -->
    <input type="text" id="doctorId" placeholder="Doctor ID">
    <button class="btn" id="doctorSignin">Sign In</button>
  </div>

  <p style="margin-top:15px;">
    New user?
    <a href="signup.html">Create an account</a>
  </p>
</section>

<footer class="footer">
  <p>© 2026 Techno Sayain</p>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
