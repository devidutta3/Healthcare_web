<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Techno Sayain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">Techno Sayain</h1>
  <nav class="nav-links">
    <a href="index.html">Home</a>
  </nav>
</header>

<section class="auth-section">
  <h3>Login to Continue</h3>
  <p>Select your role</p>

  <div class="auth-actions">
    <div class="box auth-card">
      <h4>Patient Login</h4>
      <button class="btn login-btn" data-role="patient">Login</button>
    </div>

    <div class="box auth-card">
      <h4>Doctor Login</h4>
      <button class="btn login-btn" data-role="doctor">Login</button>
    </div>
  </div>
</section>

<footer class="footer">
  <p>© 2026 Techno Sayain</p>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
