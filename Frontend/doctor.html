<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">Techno Sayain</h1>
  <nav class="nav-links">
    <a href="auth.html">Logout</a>
  </nav>
</header>

<section class="services">
  <h3>Welcome, Dr. <span id="doctorNameDisplay">Doctor</span></h3>
  <p style="margin-bottom: 20px; color: #64748b;">Specialization: <span id="doctorSpecDisplay">General</span></p>

  <!-- AI Suggestion Section -->
  <div class="service-box" style="margin-bottom: 30px; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 600px; text-align: left;">
      <h4>🤖 AI Suggested Diagnosis</h4>
      <p id="aiSuggestionText" style="margin-bottom: 15px; color: #4b5563; line-height: 1.6;">
        <strong>Analysis:</strong> High probability (87%) of a hairline fracture in the distal radius.<br>
        <strong>Recommendation:</strong> Splinting and rest for 4 weeks. Vitamin D supplementation advised.
      </p>
      <button class="btn" id="approveReportBtn">Verify & Send to Patient</button>
    </div>
  </div>

  <div class="auth-box">
    <textarea placeholder="Write medical remarks..."></textarea>
    <button class="btn">Submit Review</button>
  </div>
</section>

<footer class="footer">
  <p>© 2026 Techno Sayain</p>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
